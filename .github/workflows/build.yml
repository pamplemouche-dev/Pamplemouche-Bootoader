name: RadicalBoot-Manual

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Compiler
        run: sudo apt-get install -y clang lld

      - name: Compile RadicalBoot
        run: |
          mkdir -p build
          # Compilation directe sans headers externes pour éviter les erreurs de chemin
          clang -target x86_64-unknown-windows -ffreestanding -fshort-wchar -mno-red-zone -c src/main.c -o main.o
          lld-link -entry:efi_main -subsystem:efi_application -out:build/BOOTX64.EFI main.o

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: BOOTX64
          path: build/BOOTX64.EFI
